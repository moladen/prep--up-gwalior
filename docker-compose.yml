services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prep_up_gwalior
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prep_up_gwalior"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/prep_up_gwalior
      FRONTEND_URL: http://localhost:3000
      API_PUBLIC_URL: http://localhost:5000
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 7d
      ADMIN_EMAIL: admin@prepupgwalior.com
      ADMIN_PASSWORD: Admin@123
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  pgdata:
  uploads:
